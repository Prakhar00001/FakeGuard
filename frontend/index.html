<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FakeGuard Dashboard</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <style>
      :root { color-scheme: dark; font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
      body { margin: 0; min-height: 100vh; background: linear-gradient(120deg, #06101d, #10253a); color: #e8f1ff; }
      * { box-sizing: border-box; }
      .app-shell { max-width: 1200px; margin: 0 auto; padding: 32px; }
      .hero { margin-bottom: 24px; }
      .eyebrow { text-transform: uppercase; letter-spacing: 0.3em; color: #5dc1ff; font-size: 0.8rem; margin-bottom: 8px; }
      h1 { font-size: 2.2rem; margin: 0 0 8px; }
      .subtitle { color: #8ea7c5; max-width: 760px; }
      .dashboard { display: grid; grid-template-columns: 1.2fr 0.8fr; gap: 20px; }
      .panel { background: rgba(8, 19, 35, 0.8); border: 1px solid rgba(255,255,255,0.08); border-radius: 18px; padding: 20px; box-shadow: 0 14px 38px rgba(0,0,0,0.2); }
      textarea { width: 100%; border: 1px solid rgba(255,255,255,0.12); padding: 14px; border-radius: 12px; background: rgba(255,255,255,0.06); color: #f7f9ff; margin-top: 8px; }
      .actions { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 14px; }
      button { border: none; border-radius: 999px; padding: 10px 16px; cursor: pointer; background: #5dc1ff; color: #05101d; font-weight: 700; }
      button.secondary { background: rgba(255,255,255,0.12); color: #f7f9ff; }
      .badge { display: inline-block; padding: 8px 12px; border-radius: 999px; font-weight: 700; margin-bottom: 12px; }
      .badge.fake { background: rgba(255, 92, 92, 0.2); color: #ff8d8d; }
      .badge.genuine { background: rgba(84, 214, 116, 0.2); color: #94f4b3; }
      .score { margin: 6px 0; color: #dde8ff; }
      .hint { color: #86a5c8; }
      .feature-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 10px; margin-top: 14px; }
      .feature-card { padding: 12px; border-radius: 12px; background: rgba(255,255,255,0.06); display: flex; flex-direction: column; gap: 4px; }
      .placeholder, .error { color: #95b5d8; }
      @media (max-width: 900px) { .dashboard { grid-template-columns: 1fr; } }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script>
      const { useState } = React;
      const starterReviews = [
        'This coffee maker is absolutely amazing and the best thing ever. You need to buy it right now before it sells out! Must buy!',
        'I bought this desk lamp last week and it arrived well packaged. The brightness is steady and the build quality feels solid.',
      ];

      function App() {
        const [review, setReview] = React.useState(starterReviews[0]);
        const [result, setResult] = React.useState(null);
        const [loading, setLoading] = React.useState(false);

        const analyze = async () => {
          setLoading(true);
          try {
            const response = await fetch('http://127.0.0.1:8000/predict', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ review }),
            });
            const data = await response.json();
            setResult(data);
          } catch (error) {
            setResult({ error: 'Backend unavailable. Start the FastAPI service first.' });
          } finally {
            setLoading(false);
          }
        };

        return React.createElement(
          'div',
          { className: 'app-shell' },
          React.createElement(
            'header',
            { className: 'hero' },
            React.createElement('p', { className: 'eyebrow' }, 'FakeGuard'),
            React.createElement('h1', null, 'Detect fake product reviews in real time'),
            React.createElement('p', { className: 'subtitle' }, 'A full-stack detector driven by TF-IDF text features, linguistic heuristics, and an ensemble of ML models.')
          ),
          React.createElement(
            'main',
            { className: 'dashboard' },
            React.createElement(
              'section',
              { className: 'panel' },
              React.createElement('h2', null, 'Review analyzer'),
              React.createElement('textarea', {
                rows: '8',
                value: review,
                onChange: (event) => setReview(event.target.value),
                placeholder: 'Paste a review to inspect...'
              }),
              React.createElement(
                'div',
                { className: 'actions' },
                React.createElement('button', { onClick: analyze, disabled: loading }, loading ? 'Analyzing...' : 'Analyze review'),
                React.createElement(
                  'div',
                  null,
                  starterReviews.map((item, index) => React.createElement(
                    'button',
                    { key: item, className: 'secondary', onClick: () => setReview(item) },
                    'Example ' + (index + 1)
                  ))
                )
              )
            ),
            React.createElement(
              'section',
              { className: 'panel' },
              React.createElement('h2', null, 'Prediction'),
              result?.error
                ? React.createElement('p', { className: 'error' }, result.error)
                : result
                  ? React.createElement(
                      React.Fragment,
                      null,
                      React.createElement('div', { className: 'badge ' + (result.predicted_label === 'fake' ? 'fake' : 'genuine') }, result.predicted_label.toUpperCase()),
                      React.createElement('p', { className: 'score' }, 'Fake probability: ', React.createElement('strong', null, (result.probability_fake * 100).toFixed(1) + '%')),
                      React.createElement('p', { className: 'score' }, 'Confidence: ', React.createElement('strong', null, (result.confidence * 100).toFixed(1) + '%')),
                      React.createElement('p', { className: 'hint' }, 'Model accuracy on held-out test data: ', result.model_accuracy),
                      React.createElement(
                        'div',
                        { className: 'feature-grid' },
                        Object.entries(result.features || {}).map(([key, value]) => React.createElement(
                          'div',
                          { key, className: 'feature-card' },
                          React.createElement('span', null, key),
                          React.createElement('strong', null, value)
                        ))
                      )
                    )
                  : React.createElement('p', { className: 'placeholder' }, 'Submit a review to see a prediction and linguistic indicators.')
            )
          )
        );
      }

      const root = ReactDOM.createRoot(document.getElementById('root'));
      root.render(React.createElement(App));
    </script>
  </body>
</html>
